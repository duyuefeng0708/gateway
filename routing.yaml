# Smart Model Routing Configuration
#
# Routes requests to different upstream providers based on the computed
# privacy score (0-100). Higher scores indicate less PII detected.
#
# Set GATEWAY_ROUTING_CONFIG=/path/to/routing.yaml to enable.
# If not set, the gateway uses the default single-upstream behavior.

routes:
  - name: "direct"
    score_min: 90
    score_max: 100
    upstream_url: "https://api.anthropic.com"
    api_format: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"

  - name: "anonymized-primary"
    score_min: 50
    score_max: 89
    upstream_url: "https://api.anthropic.com"
    api_format: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"

  - name: "anonymized-cheap"
    score_min: 0
    score_max: 49
    upstream_url: "https://api.openai.com"
    api_format: "openai"
    api_key_env: "OPENAI_API_KEY"
