services:
  gateway-proxy:
    build: .
    ports:
      - "8443:8443"
    environment:
      - GATEWAY_LISTEN=0.0.0.0:8443
      - GATEWAY_UPSTREAM=https://api.anthropic.com
      - GATEWAY_OLLAMA_URL=http://gateway-ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - gateway-data:/app/data
    depends_on:
      gateway-ollama:
        condition: service_healthy

  gateway-ollama:
    image: ollama/ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ollama-models:/root/.ollama

  gateway-ebpf:
    build:
      context: .
      dockerfile: crates/gateway-ebpf-loader/Dockerfile
    privileged: true
    pid: host
    network_mode: host
    cap_add:
      - BPF
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ./endpoints.yaml:/etc/gateway/endpoints.yaml:ro
    command: ["gateway-ebpf-loader", "--config", "/etc/gateway/endpoints.yaml"]
    depends_on:
      gateway-proxy:
        condition: service_started

volumes:
  gateway-data:
  ollama-models:
